name: Linux

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-bot:
    name: brew test-bot (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            uname_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            uname_arch: aarch64
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/homebrew/brew:main
    timeout-minutes: 90

    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: linux-${{ matrix.arch }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: |
            linux-${{ matrix.arch }}-rubygems-

      - name: Verify runner architecture
        run: |
          test "$(uname -s)" = Linux
          test "$(uname -m)" = "${{ matrix.uname_arch }}"
          df -h

      - name: Clean up runner
        run: brew test-bot --only-cleanup-before

      - name: Set up test-bot
        run: brew test-bot --only-setup

      - name: Check tap syntax
        run: brew test-bot --only-tap-syntax

      - name: Build and test changed formulae
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-formulae --fail-fast

      - name: Build and test smolvm
        if: github.event_name != 'pull_request'
        run: brew test-bot --only-formulae --testing-formulae=smolvm --fail-fast

      - name: Upload bottles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bottles-linux-${{ matrix.arch }}
          path: "*.bottle.*"
          if-no-files-found: ignore
          retention-days: 7
