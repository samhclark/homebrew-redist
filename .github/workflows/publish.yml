name: Publish bottles

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula to publish, or changed to publish every Formula present in the run
        required: false
        default: changed
        type: choice
        options:
          - changed
          - smolvm
          - smolvm-libkrunfw
          - smolvm-virglrenderer
      run_id:
        description: Successful Homebrew workflow run ID containing the bottles
        required: true
        type: string

concurrency:
  group: publish-bottles
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      actions: read
      contents: write

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@6315ef70a8bfcd2c71104383846591ac113ace33 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: publish-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: |
            publish-rubygems-

      - name: Validate source run
        id: source-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          run_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID")"

          test "$(jq -r .status <<<"$run_json")" = "completed"
          test "$(jq -r .conclusion <<<"$run_json")" = "success"
          test "$(jq -r .head_branch <<<"$run_json")" = "main"
          test "$(jq -r .path <<<"$run_json")" = ".github/workflows/tests.yml"

          source_sha="$(jq -r .head_sha <<<"$run_json")"
          git fetch --no-tags origin "$source_sha"
          git merge-base --is-ancestor "$source_sha" HEAD

          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "Publishing bottles from run $RUN_ID at $source_sha"

      - name: Download bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          pattern: "*bottles-*"
          merge-multiple: true
          path: bottles

      - name: Select bottles
        id: select
        env:
          FORMULA: ${{ inputs.formula || 'changed' }}
          SOURCE_SHA: ${{ steps.source-run.outputs.sha }}
        run: |
          mapfile -t formulas < <(bash .github/scripts/publish-bottles.sh select "$FORMULA" "$SOURCE_SHA" bottles)
          if [[ "${#formulas[@]}" -eq 0 ]]; then
            echo "No bottle artifacts selected for publishing." >&2
            exit 1
          fi

          formulas_csv="$(IFS=,; printf '%s' "${formulas[*]}")"
          echo "formulas=$formulas_csv" >> "$GITHUB_OUTPUT"

          {
            echo "### Bottles selected for publishing"
            echo
            printf -- "- \`%s\`\\n" "${formulas[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up git
        uses: Homebrew/actions/git-user-config@6315ef70a8bfcd2c71104383846591ac113ace33 # main

      - name: Publish bottles and commit bottle block
        env:
          FORMULAS: ${{ steps.select.outputs.formulas }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_NO_AUTO_UPDATE: 1
          SOURCE_SHA: ${{ steps.source-run.outputs.sha }}
        run: |
          IFS=, read -r -a formulas <<< "$FORMULAS"
          bash .github/scripts/publish-bottles.sh publish "$SOURCE_SHA" bottles "${formulas[@]}"

      - name: Push bottle commit
        uses: Homebrew/actions/git-try-push@6315ef70a8bfcd2c71104383846591ac113ace33 # main
        with:
          branch: main
