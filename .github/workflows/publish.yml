name: Publish bottles

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula whose bottles should be published
        required: true
        type: choice
        options:
          - smolvm
          - smolvm-virglrenderer
      run_id:
        description: Successful Homebrew workflow run ID containing the bottles
        required: true
        type: string

concurrency:
  group: publish-bottles
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      actions: read
      contents: write

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: publish-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: |
            publish-rubygems-

      - name: Validate source run
        id: source-run
        env:
          FORMULA: ${{ inputs.formula }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          run_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID")"

          test "$(jq -r .status <<<"$run_json")" = "completed"
          test "$(jq -r .conclusion <<<"$run_json")" = "success"
          test "$(jq -r .head_branch <<<"$run_json")" = "main"
          test "$(jq -r .path <<<"$run_json")" = ".github/workflows/tests.yml"

          source_sha="$(jq -r .head_sha <<<"$run_json")"
          git fetch --no-tags origin "$source_sha"
          git merge-base --is-ancestor "$source_sha" HEAD

          case "$FORMULA" in
            smolvm)
              formula_paths=(Formula/smolvm.rb Resources/smolvm/Cargo.lock)
              ;;
            smolvm-virglrenderer)
              formula_paths=(Formula/smolvm-virglrenderer.rb)
              ;;
            *)
              echo "Unsupported Formula: $FORMULA" >&2
              exit 1
              ;;
          esac

          if ! git diff --quiet "$source_sha" HEAD -- "${formula_paths[@]}"; then
            echo "Formula inputs changed after run $RUN_ID; publish a newer run." >&2
            exit 1
          fi

          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "Publishing $FORMULA bottles from run $RUN_ID at $source_sha"

      - name: Download bottles
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          pattern: ${{ inputs.formula == 'smolvm' && 'bottles-*' || 'virglrenderer-bottles-*' }}
          merge-multiple: true
          path: bottles

      - name: Validate bottles
        env:
          FORMULA: ${{ inputs.formula }}
          SOURCE_SHA: ${{ steps.source-run.outputs.sha }}
        run: |
          shopt -s nullglob
          jsons=(bottles/*.bottle.json)
          archives=(bottles/*.bottle*.tar.gz)

          case "$FORMULA" in
            smolvm)
              expected_count=3
              expected_tags=(arm64_linux arm64_tahoe x86_64_linux)
              ;;
            smolvm-virglrenderer)
              expected_count=2
              expected_tags=(arm64_linux x86_64_linux)
              ;;
            *)
              echo "Unsupported Formula: $FORMULA" >&2
              exit 1
              ;;
          esac

          test "${#jsons[@]}" -eq "$expected_count"
          test "${#archives[@]}" -eq "$expected_count"

          mapfile -t revisions < <(
            jq -r '.[].formula.tap_git_revision' "${jsons[@]}" | sort -u
          )
          test "${#revisions[@]}" -eq 1
          test "${revisions[0]}" = "$SOURCE_SHA"

          mapfile -t formulae < <(
            jq -r 'keys[]' "${jsons[@]}" | sort -u
          )
          test "${#formulae[@]}" -eq 1
          test "${formulae[0]}" = "samhclark/redist/$FORMULA"

          mapfile -t tags < <(
            jq -r '.[].bottle.tags | keys[]' "${jsons[@]}" | sort
          )
          test "${tags[*]}" = "${expected_tags[*]}"

          mapfile -t root_urls < <(
            jq -r '.[].bottle.root_url' "${jsons[@]}" | sort -u
          )
          test "${#root_urls[@]}" -eq 1
          [[ "${root_urls[0]}" == \
            "https://github.com/$GITHUB_REPOSITORY/releases/download/$FORMULA-"* ]]

          while read -r archive; do
            test -f "bottles/$archive"
          done < <(jq -r '.[].bottle.tags[].local_filename' "${jsons[@]}")

          cp "${jsons[@]}" "${archives[@]}" .

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Publish bottles and commit bottle block
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew pr-upload --debug

      - name: Push bottle commit
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main
