name: Release bottles

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Successful Homebrew workflow run ID containing the first bottles
        required: true
        type: string
      formula:
        description: Formula to release, or changed to release every Formula present in the run
        required: false
        default: changed
        type: choice
        options:
          - changed
          - smolvm
          - smolvm-libkrunfw
          - smolvm-virglrenderer

concurrency:
  group: release-bottles
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    permissions:
      actions: write
      contents: read

    steps:
      - name: Check out tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download source bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          pattern: "*bottles-*"
          merge-multiple: true
          path: bottles

      - name: Release bottle chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BOTTLES_REF: main
        run: bash .github/scripts/release-bottles.sh run "${{ inputs.run_id }}" "${{ inputs.formula || 'changed' }}" bottles
